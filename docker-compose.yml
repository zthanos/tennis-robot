services:
  otel-collector:
    image: otel/opentelemetry-collector:0.128.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
  sim-dev:
    build: .
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - PYTHONPATH=/workspace
      - UV_PROJECT_ENVIRONMENT=/opt/tennis-robot-venv
      - UV_LINK_MODE=copy
  webots:
    build:
      context: .
      dockerfile: Dockerfile.webots
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "6080:6080"
      - "5900:5900"
    shm_size: "2gb"
    environment:
      - WEBOTS_WORLD=/workspace/worlds/tennis_court.wbt
      - DISPLAY_SIZE=1280x800x24
      - OTEL_ENABLED=true
      - OTEL_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_METRIC_EXPORT_INTERVAL_MS=5000
      - ROBOT_COMMAND_FILE=/workspace/runtime/robot_command.json
      - USE_RGB_VISION=true
      - ROBOT_MAX_WHEEL_SPEED_RAD_S=3.5
      - COLLECTOR_SCAN_ANGULAR_SPEED_RAD_S=0.35
      - COLLECTOR_MAX_ALIGN_ANGULAR_SPEED_RAD_S=0.45
      - COLLECTOR_ALIGN_ANGULAR_GAIN=1.4
      - COLLECTOR_APPROACH_SPEED_M_S=0.12
      - COLLECTOR_CAPTURE_SPEED_M_S=0.05
      - COLLECTOR_REVERSE_SPEED_M_S=0.08
      - SURVEY_DRIVE_SPEED_M_S=0.24
      - SURVEY_TURN_SPEED_RAD_S=0.75
      - SURVEY_HEADING_GAIN=2.2
    depends_on:
      - otel-collector
  openscad:
    image: openscad/openscad:bookworm
    profiles: ["cad"]
    working_dir: /workspace
    volumes:
      - .:/workspace
  openscad-gui:
    build:
      context: .
      dockerfile: Dockerfile.openscad
    profiles: ["cad"]
    working_dir: /workspace
    ports:
      - "6081:6080"
      - "5901:5900"
    shm_size: "512mb"
    environment:
      - DISPLAY_SIZE=1280x800x24
      - OPENSCAD_FILE=/workspace/cad/3d-printable-base/full_robot_concept.scad
    volumes:
      - .:/workspace
